name: Deploy to Cloudflare

# Deploys the pinned projektor release (see ./projektor.version) on every push to
# main, or on demand. Bump projektor.version and push to roll out a new version.
#
# Also runs on PRs targeting main (dry-run only, no Cloudflare auth needed) so
# this job can be a required status check on main (see the branch ruleset) —
# a push-only trigger would never report a check on a PR's head commit and
# would block every merge forever.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read   # checkout + gh release download only; no write access needed

jobs:
  deploy:
    name: Deploy projektor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'   # wrangler 4.x requires Node >= 22

      - name: Install wrangler
        run: npm install

      - name: Fetch release
        run: |
          set -euo pipefail
          VERSION="$(cat projektor.version)"
          echo "==> Fetching projektor $VERSION from $PROJEKTOR_REPO"
          rm -rf vendor && mkdir -p vendor
          TMP="$(mktemp -d)"
          gh release download "$VERSION" -R "$PROJEKTOR_REPO" -p 'projektor-*.tar.gz' -D "$TMP"
          tar -xzf "$TMP"/projektor-*.tar.gz -C vendor
          rm -rf "$TMP"
        env:
          # The projektor repo to pull the release from.
          PROJEKTOR_REPO: TAJD/projektor
          # projektor is public, so the default job token (read-only, scoped to
          # this run) is enough to fetch the release asset — no PAT needed.
          GH_TOKEN: ${{ github.token }}

      - name: Validate (dry-run)
        # Runs on PRs — compiles + checks bindings against wrangler.demo.toml
        # without uploading or needing Cloudflare auth, so this passes for
        # untrusted/fork PRs too.
        if: github.event_name == 'pull_request'
        run: npx wrangler deploy --config wrangler.demo.toml --dry-run

      - name: Migrate + deploy
        # wrangler.demo.toml is a committed, binding-only config for the
        # projektor-demo instance (see PROJ-284) — unlike deploy.sh, it needs no
        # gitignored wrangler.toml bootstrap step, so CI can run non-interactively.
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          npx wrangler d1 migrations apply DB --remote --config wrangler.demo.toml
          npx wrangler deploy --config wrangler.demo.toml
        env:
          # Cloudflare auth (see README for the correct token scopes — must include D1).
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Health check
        # Catch a broken deploy in CI instead of discovering it later (PROJ-280).
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          code="$(curl -s -o /dev/null -w '%{http_code}' "$DEMO_URL")"
          echo "==> $DEMO_URL responded $code"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Health check failed: $DEMO_URL returned $code"
            exit 1
          fi
        env:
          DEMO_URL: https://projektor-demo.tajdickson.workers.dev/
